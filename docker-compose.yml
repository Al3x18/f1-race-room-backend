services:
  f1-race-room-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5050:5050"
    environment:
      API_REQUEST_KEY: "${API_REQUEST_KEY:-}"
      API_KEY_HEADER: "${API_KEY_HEADER:-X-API-Key}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      TELEMETRY_CONFIG_FILE: "${TELEMETRY_CONFIG_FILE:-./config/telemetry.toml}"
      TELEMETRY_MAX_CONCURRENCY: "${TELEMETRY_MAX_CONCURRENCY:-2}"
      TELEMETRY_MAX_PLOT_POINTS: "${TELEMETRY_MAX_PLOT_POINTS:-1200}"
      TELEMETRY_CACHE_DIR: "/data/telemetry-pdfs"
      TELEMETRY_CACHE_MAX_DOCS: "${TELEMETRY_CACHE_MAX_DOCS:-100}"
      TELEMETRY_CACHE_MAX_MB: "${TELEMETRY_CACHE_MAX_MB:-500}"
    volumes:
      - telemetry-cache:/data

volumes:
  telemetry-cache:
