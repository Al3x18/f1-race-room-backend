# Telemetry runtime configuration
# This file is read at startup by src/telemetry_runtime_config.py

# How many telemetry generations can run in parallel.
max_concurrency = 2

# Max sampled points rendered in plots (higher = more detail, more RAM/CPU).
max_plot_points = 1800

# Folder where generated PDFs are cached.
cache_dir = "./telemetry_files_cache"

# Maximum number of cached PDF documents.
cache_max_docs = 20
